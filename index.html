<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Journal — Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Caveat:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="notebook">
  <div class="binding"></div>
  <div class="page">
    <header>
      <p class="date-label" id="date-label"></p>
      <h1>Tasks</h1>
      <p class="subtitle">— write it down, get it done.</p>
    </header>

    <div class="input-row">
      <input
              type="text"
              class="task-input"
              id="task-input"
              placeholder="Add a new task…"
              maxlength="120"
              autocomplete="off"
      />
      <button class="add-btn" id="add-btn" aria-label="Add task">+</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
    </div>

    <ul class="task-list" id="task-list"></ul>

    <div class="empty-state" id="empty-state">
      <span class="empty-doodle">✏️</span>
      <p>Nothing here yet — start writing!</p>
    </div>

    <div class="footer">
      <span class="stats" id="stats"></span>
      <button class="clear-btn" id="clear-btn">clear completed</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
